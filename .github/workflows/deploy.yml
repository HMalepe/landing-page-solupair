name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Force Nitro Cloudflare output (.output/server) instead of Vercel (.vercel/output).
      NITRO_PRESET: cloudflare_module

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build for Cloudflare
        run: npm run cf:build

      - name: Clear Wrangler deploy metadata
        run: rm -rf .wrangler

      - name: Verify Cloudflare output
        run: |
          test -f .output/server/wrangler.json
          test -d .output/public
          ls -la .output/server | head

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: .output/server
          command: deploy --config wrangler.json
